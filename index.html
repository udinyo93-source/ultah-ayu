<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 🎉</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      text-align: center;
      color: white;
      overflow: hidden;
    }

    h1 {
      margin-top: 20vh;
      font-size: 3em;
      animation: fadeIn 2s ease-in-out;
    }

    p {
      font-size: 1.5em;
      animation: fadeIn 3s ease-in-out;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 10px;
      background: white;
      color: #ff6b81;
      cursor: pointer;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);} 
      to {opacity: 1; transform: translateY(0);} 
    }

    .balloon {
      position: absolute;
      bottom: -150px;
      width: 50px;
      height: 70px;
      background: red;
      border-radius: 50%;
      animation: float 6s infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      100% { transform: translateY(-120vh); }
    }
  </style>
</head>
<body>

  <h1 id="title">Happy Birthday 🎂</h1>
  <p id="message">Semoga panjang umur, sehat selalu, dan bahagia! 💖</p>
  <button onclick="playMusic()">Putar Musik 🎵</button>

  <audio id="music" src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3"></audio>

  <script>
    function playMusic() {
      document.getElementById("music").play();
    }

    // Generate balloons
    for (let i = 0; i < 10; i++) {
      let balloon = document.createElement("div");
      balloon.classList.add("balloon");
      balloon.style.left = Math.random() * 100 + "vw";
      balloon.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
      balloon.style.animationDuration = (4 + Math.random()*3) + "s";
      document.body.appendChild(balloon);
    }
  </script>

</body>
</html>
