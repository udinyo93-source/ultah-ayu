<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Story 💖</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  background: black;
  color: white;
  text-align: center;
}

/* Semua scene */
.scene {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* Scene aktif */
.active {
  display: flex;
}

/* Button */
button {
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff6b81;
  cursor: pointer;
  margin-top: 20px;
}

/* Animasi */
.fade {
  animation: fadeIn 2s;
}

@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

/* Video popup */
iframe {
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- 🎬 SCENE 1: OPENING -->
<div id="scene1" class="scene active">
  <h1>Hai Ayu 😊</h1>
  <p>Ada sesuatu buat kamu...</p>
  <button onclick="nextScene(2)">Mulai 💖</button>
</div>

<!-- 🎬 SCENE 2: VIDEO -->
<div id="scene2" class="scene">
  <iframe 
    id="videoFrame"
    width="350" 
    height="220"
    src=""
    frameborder="0"
    allow="autoplay"
    allowfullscreen>
  </iframe>
</div>

<!-- 🎬 SCENE 3 -->
<div id="scene3" class="scene">
  <h1 class="fade">Aku ga jago kata-kata...</h1>
</div>

<!-- 🎬 SCENE 4 -->
<div id="scene4" class="scene">
  <h1 class="fade">Tapi aku selalu doain yang terbaik buat kamu 💖</h1>
</div>

<!-- 🎬 SCENE 5 (ENDING) -->
<div id="scene5" class="scene">
  <h1 class="fade">Happy Birthday Ayu 🎂</h1>
  <p class="fade">Semoga semua impian kamu tercapai ✨</p>
</div>

<script>
function nextScene(n) {
  document.querySelectorAll(".scene").forEach(s => s.classList.remove("active"));
  document.getElementById("scene" + n).classList.add("active");

  // kalau masuk scene video
  if (n === 2) {
    document.getElementById("videoFrame").src =
      "https://www.youtube.com/embed/INhMOPP4_48?autoplay=1";

    // setelah video (10 detik)
    setTimeout(() => nextScene(3), 10000);
  }

  if (n === 3) {
    setTimeout(() => nextScene(4), 3000);
  }

  if (n === 4) {
    setTimeout(() => nextScene(5), 3000);
  }
}
</script>

</body>
</html>
